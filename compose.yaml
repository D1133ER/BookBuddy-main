version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: bookbuddy-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookbuddy
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
      - bookbuddy_pgdata:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bookbuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookbuddy_pgdata:
