<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bookbuddy-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="BookBuddy - Share, borrow, and discover books with your local community. Join 2,500+ book lovers exchanging books for free." />
    <meta name="keywords" content="book sharing, book exchange, community books, borrow books, free books, reading community" />
    <meta name="author" content="BookBuddy" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bookbuddy.app/" />
    <meta property="og:title" content="BookBuddy | Share & Discover Books" />
    <meta property="og:description" content="Join our platform to exchange, borrow, and discover books with people in your community." />
    <meta property="og:image" content="/hero-library.svg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://bookbuddy.app/" />
    <meta property="twitter:title" content="BookBuddy | Share & Discover Books" />
    <meta property="twitter:description" content="Join our platform to exchange, borrow, and discover books with people in your community." />
    <meta property="twitter:image" content="/hero-library.svg" />
    
    <!-- Preload critical resources for LCP -->
    <link 
      rel="preload" 
      as="image" 
      href="/hero-library.svg" 
      fetchpriority="high"
    />
    
    <!-- Note: Security headers (CSP, HSTS, X-Frame-Options, etc.) must be set via server configuration -->
    <!-- See .htaccess (Apache) or nginx.conf for proper header implementation -->
    
    <title>BookBuddy | Share, Borrow & Discover Books in Your Community</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Live region for screen reader announcements -->
    <div id="aria-live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
